<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg,#0b1120,#0f172a);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    width:90%;
    max-width:1200px;
    background: rgba(255,255,255,0.02);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 40px rgba(0,194,255,0.1);
}

/* NAV */
nav{
    position:absolute;
    top:30px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:1200px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-weight:700;
    font-size:22px;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li{
    cursor:pointer;
    transition:.3s;
}

nav ul li:hover{
    color:#00c2ff;
}

/* LEFT SIDE */
.left{
    width:50%;
}

.left h1{
    font-size:48px;
    font-weight:800;
}

.left h2{
    color:#00c2ff;
    margin-top:10px;
    font-weight:600;
}

.left p{
    margin-top:20px;
    color:#cbd5e1;
    line-height:1.6;
}

.buttons{
    margin-top:30px;
    display:flex;
    gap:20px;
}

.btn-primary{
    background:#00c2ff;
    padding:12px 28px;
    border:none;
    border-radius:8px;
    color:#000;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn-primary:hover{
    box-shadow:0 0 20px #00c2ff;
}

.btn-outline{
    background:transparent;
    padding:12px 28px;
    border:2px solid #00c2ff;
    border-radius:8px;
    color:#00c2ff;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn-outline:hover{
    background:#00c2ff;
    color:black;
}

/* SOCIAL */
.social{
    margin-top:40px;
    display:flex;
    gap:20px;
}

.social a{
    width:40px;
    height:40px;
    border:2px solid #00c2ff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#00c2ff;
    text-decoration:none;
    transition:.3s;
}

.social a:hover{
    background:#00c2ff;
    color:black;
    box-shadow:0 0 15px #00c2ff;
}

/* RIGHT SIDE */
.right{
    width:45%;
    position:relative;
}

.right img{
    width:100%;
    border-radius:20px;
    filter:brightness(0.8);
}

/* Glow Effect */
.right::before{
    content:'';
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120%;
    height:120%;
    background: radial-gradient(circle,#00c2ff55,transparent 60%);
    z-index:-1;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
        text-align:center;
    }
    .left,.right{
        width:100%;
    }
    .buttons{
        justify-content:center;
    }
    .social{
        justify-content:center;
    }
}
</style>
</head>

<body>

<nav>
    <div class="logo">Jacob.</div>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Portfolio</li>
        <li>Contact</li>
    </ul>
</nav>

<div class="container">

    <div class="left">
        <h1>Hi, I'm Your Name</h1>
        <h2>Frontend Developer</h2>
        <p>
            I build modern, high-performance websites with clean UI and smooth user experience.
            Passionate about design, code quality and digital innovation.
        </p>

        <div class="buttons">
            <button class="btn-primary">Hire Me</button>
            <button class="btn-outline">Let's Talk</button>
        </div>

        <div class="social">
            <a href="#">F</a>
            <a href="#">T</a>
            <a href="#">in</a>
        </div>
    </div>

    <div class="right">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e" alt="Profile">
    </div>

</div>

</body>
</html>
